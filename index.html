<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What is my IP?</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --border:  #2a2d3a;
    --accent:  #5b8af5;
    --danger:  #e05c5c;
    --ok:      #4caf82;
    --text:    #e2e4ed;
    --muted:   #6b6f82;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    gap: 1.5rem;
  }

  .cards {
    display: flex;
    gap: 1.5rem;
    width: 100%;
    max-width: 1160px;
    justify-content: center;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    flex: 1;
    max-width: 560px;
    overflow: hidden;
  }

  .card-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .card-header h2 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: .4rem;
  }

  .ip-address {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
    word-break: break-all;
  }

  .rows { padding: 0.5rem 0; }

  .row {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    padding: 0.55rem 1.5rem;
    transition: background 0.1s;
  }
  .row:hover { background: rgba(255,255,255,.03); }

  .label {
    flex: 0 0 140px;
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .value { word-break: break-all; }
  .value.empty { color: var(--muted); font-style: italic; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-ok     { background: rgba(76,175,130,.15); color: var(--ok); }
  .badge-danger { background: rgba(224,92,92,.15);  color: var(--danger); }

  .card-footer {
    padding: 0.9rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
  }

  .json-link {
    color: var(--muted);
    font-size: 12px;
    text-decoration: none;
    letter-spacing: .04em;
  }
  .json-link:hover { color: var(--accent); }

  .status {
    color: var(--muted);
    font-size: 13px;
    padding: 2rem;
    text-align: center;
  }

  @media (max-width: 700px) {
    .cards { flex-direction: column; align-items: center; }
    .card  { max-width: 100%; width: 100%; }
    .row   { flex-direction: column; gap: 0.2rem; }
    .label { flex: none; }
  }
</style>
</head>
<body>
<div class="cards" id="cards"></div>

<script>
const cfg = {
  ipv4Url: {{.IPv4URL}},
  ipv6Url: {{.IPv6URL}}
};

function set(el, text) {
  if (text) {
    el.textContent = text;
  } else {
    el.textContent = 'n/a';
    el.classList.add('empty');
  }
}

function makeCard(label, jsonUrl) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML =
    '<div class="card-header">' +
      '<h2>' + label + '</h2>' +
      '<div class="ip-address" id="ip-' + label + '">&hellip;</div>' +
    '</div>' +
    '<div class="status" id="status-' + label + '">Loading&hellip;</div>' +
    '<div class="rows" id="rows-' + label + '" hidden>' +
      '<div class="row"><span class="label">Hostname</span><span class="value" id="hostname-'   + label + '"></span></div>' +
      '<div class="row"><span class="label">ISP</span><span class="value" id="isp-'             + label + '"></span></div>' +
      '<div class="row"><span class="label">City</span><span class="value" id="city-'           + label + '"></span></div>' +
      '<div class="row"><span class="label">Country</span><span class="value" id="country-'     + label + '"></span></div>' +
      '<div class="row"><span class="label">Country code</span><span class="value" id="cc-'     + label + '"></span></div>' +
      '<div class="row"><span class="label">Location</span><span class="value" id="location-'   + label + '"></span></div>' +
      '<div class="row"><span class="label">Tor exit</span><span class="value" id="tor-'        + label + '"></span></div>' +
    '</div>' +
    '<div class="card-footer"><a class="json-link" href="' + jsonUrl + '">JSON &rarr;</a></div>';

  document.getElementById('cards').appendChild(card);

  fetch(jsonUrl)
    .then(function(r) {
      const status = r.status;
      return r.text().then(function(text) {
        if (!r.ok) throw new Error('Server returned HTTP ' + status);
        let d;
        try {
          d = JSON.parse(text);
        } catch(_) {
          throw new Error('Response is not valid JSON');
        }
        if (typeof d !== 'object' || d === null || !('IPAddress' in d)) {
          throw new Error('Unexpected response shape');
        }
        return d;
      });
    })
    .then(function(d) {
      document.getElementById('ip-' + label).textContent = d.IPAddress || 'unknown';
      set(document.getElementById('hostname-' + label), d.Hostname);
      set(document.getElementById('isp-'      + label), d.ISP);
      set(document.getElementById('city-'     + label), d.City);
      set(document.getElementById('country-'  + label), d.Country);
      set(document.getElementById('cc-'       + label), d.CountryCode);
      set(document.getElementById('location-' + label), d.Location);

      const torEl = document.getElementById('tor-' + label);
      torEl.innerHTML = d.TorExit
        ? '<span class="badge badge-danger">Yes</span>'
        : '<span class="badge badge-ok">No</span>';

      document.getElementById('status-' + label).hidden = true;
      document.getElementById('rows-'   + label).hidden = false;
    })
    .catch(function(err) {
      const statusEl = document.getElementById('status-' + label);
      statusEl.textContent = err.message;
      statusEl.style.color = 'var(--danger)';
    });
}

if (cfg.ipv4Url && cfg.ipv6Url) {
  makeCard('IPv4', cfg.ipv4Url);
  makeCard('IPv6', cfg.ipv6Url);
} else {
  makeCard('IP', cfg.ipv4Url || cfg.ipv6Url || '/json');
}
</script>
</body>
</html>
